name: Test GIMSOI AI Agent

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Check TypeScript compilation
      run: npx tsc --noEmit
    
    - name: Check file structure
      run: |
        echo "Checking repository structure..."
        
        # Check required files exist
        [ -f "package.json" ] && echo "✅ package.json exists" || echo "❌ package.json missing"
        [ -f "tsconfig.json" ] && echo "✅ tsconfig.json exists" || echo "❌ tsconfig.json missing"
        [ -f "backend/src/server.ts" ] && echo "✅ server.ts exists" || echo "❌ server.ts missing"
        
        echo "✅ Structure validation complete!"
    
    - name: Verify TypeScript config
      run: |
        node -e "
        const tsconfig = require('./tsconfig.json');
        console.log('✅ tsconfig.json is valid');
        "
